<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Matrix - 投资分析员</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-secondary: #8b8fa3;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #22c55e;
    --warning: #f59e0b;
    --error: #ef4444;
    --tool-call: #1e293b;
    --tool-result: #0f172a;
    --radius: 8px;
    --code-bg: #1e293b;
    --table-stripe: #1e2233;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* ---- Sidebar (Apple Light) ---- */
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 260px;
    background: #f5f5f7;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    padding: 16px 12px;
    gap: 16px;
    -webkit-user-select: none;
    user-select: none;
  }
  /* New session button */
  .new-session-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: #e5e5ea;
    border: none;
    border-radius: 8px;
    padding: 11px 14px;
    cursor: pointer;
    font-size: 14px;
    color: #1d1d1f;
    font-weight: 500;
    transition: background 0.12s;
  }
  .new-session-btn:hover { background: #dcdce0; }
  .new-session-btn .left { display: flex; align-items: center; gap: 10px; }
  .new-session-btn .left svg { width: 18px; height: 18px; color: #6e6e73; }
  .new-session-btn .right { display: flex; align-items: center; gap: 6px; color: #aeaeb2; font-size: 12px; font-weight: 400; }
  .new-session-btn .right svg { width: 14px; height: 14px; }
  /* Quick entries */
  .quick-entries { display: flex; flex-direction: column; gap: 2px; }
  .quick-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #1d1d1f;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .quick-entry:hover { background: rgba(0,0,0,0.04); }
  .quick-entry svg { width: 18px; height: 18px; color: #6e6e73; flex-shrink: 0; }
  /* Session list section */
  .session-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .session-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px 8px;
  }
  .session-section-header span {
    font-size: 12px;
    font-weight: 600;
    color: #aeaeb2;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .session-section-header .actions { display: flex; gap: 8px; }
  .session-section-header .actions svg { width: 15px; height: 15px; color: #aeaeb2; cursor: pointer; }
  .session-section-header .actions svg:hover { color: #6e6e73; }
  .session-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .session-item {
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #1d1d1f;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .session-item:hover { background: rgba(0,0,0,0.04); }
  .session-item.active { background: rgba(0,122,255,0.1); color: #007aff; }
  .session-item .icon { width: 18px; height: 18px; color: #6e6e73; flex-shrink: 0; }
  .session-item .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .session-item .meta { font-size: 11px; color: #aeaeb2; flex-shrink: 0; }
  .session-item .del {
    display: none;
    font-size: 11px;
    color: #aeaeb2;
    padding: 2px 4px;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .session-item:hover .del { display: block; }
  .session-item .del:hover { background: rgba(255,59,48,0.1); color: #ff3b30; }
  .no-sessions { font-size: 13px; color: #aeaeb2; text-align: center; padding: 20px; }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .welcome { text-align: center; margin-top: 80px; }
  .welcome h2 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .welcome p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  .welcome .hints { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
  .hint { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .hint:hover { border-color: var(--accent); color: var(--text); }
  .message { max-width: 860px; width: 100%; margin: 0 auto; }
  .message.user { align-self: flex-end; text-align: right; }
  .message.user .bubble { background: var(--accent); padding: 10px 16px; border-radius: var(--radius); display: inline-block; max-width: 85%; text-align: left; font-size: 14px; }
  .message.assistant { align-self: flex-start; }
  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.8;
    max-width: 100%;
    overflow-x: auto;
  }
  /* Markdown content styles */
  .content h1, .content h2, .content h3 { margin: 16px 0 8px; font-weight: 600; }
  .content h1 { font-size: 1.3em; }
  .content h2 { font-size: 1.15em; }
  .content h3 { font-size: 1.05em; }
  .content p { margin: 6px 0; }
  .content ul, .content ol { margin: 6px 0; padding-left: 20px; }
  .content li { margin: 3px 0; }
  .content strong { color: #fff; font-weight: 600; }
  .content em { color: #c4b5fd; }
  .content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.9em;
    color: #a78bfa;
  }
  .content pre {
    background: var(--code-bg);
    padding: 14px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--border);
  }
  .content pre code { padding: 0; background: none; color: var(--text-secondary); }
  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 14px;
    margin: 8px 0;
    color: var(--text-secondary);
    background: rgba(99,102,241,0.05);
    border-radius: 0 4px 4px 0;
  }
  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 13px;
  }
  .content th, .content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .content th { background: var(--code-bg); font-weight: 600; color: var(--text); }
  .content tr:nth-child(even) td { background: var(--table-stripe); }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .content a { color: var(--accent-hover); }
  /* Tool section */
  .tool-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 6px 0;
    overflow: hidden;
  }
  .tool-header {
    background: var(--tool-call);
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .tool-header .name { font-family: monospace; color: var(--warning); }
  .tool-header .arrow { margin-left: auto; transition: transform 0.15s; }
  .tool-section.open .tool-header .arrow { transform: rotate(180deg); }
  .tool-body {
    background: var(--tool-result);
    padding: 0;
    font-size: 12px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease-out, padding 0.2s;
  }
  .tool-section.open .tool-body {
    max-height: 400px;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .tool-body pre {
    margin: 0;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }
  .tool-body table { width: 100%; border-collapse: collapse; margin: 0; }
  .tool-body th, .tool-body td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; font-size: 12px; }
  .tool-body th { background: var(--code-bg); color: var(--text); }
  .tool-body .stat { color: var(--warning); font-weight: 600; }
  .thinking {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 10px 0;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    flex-shrink: 0;
  }
  .input-row { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; }
  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-secondary); }
  .input-row button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .input-row button:hover { background: var(--accent-hover); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .reset-btn { background: transparent!important; border: 1px solid var(--border)!important; color: var(--text-secondary)!important; font-size: 12px!important; padding: 10px 12px!important; }
  .reset-btn:hover { border-color: var(--error)!important; color: var(--error)!important; }
  .error-block { background: rgba(239,68,68,0.1); border: 1px solid var(--error); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--error); margin: 8px 0; }
  .duration { font-size: 11px; color: var(--text-secondary); margin-top: 6px; opacity: 0.6; }
</style>
</head>
<body>
<header>
  <h1>Project Matrix</h1>
  <span class="status"><span class="dot"></span> 投资分析员 V1</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <!-- New session -->
    <button class="new-session-btn" onclick="newSession()">
      <span class="left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        新建会话
      </span>
      <span class="right">
        <span>⌘N</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </span>
    </button>

    <!-- Quick entries -->
    <div class="quick-entries">
      <button class="quick-entry" onclick="document.getElementById('input').value='组合复盘';send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        技能
      </button>
      <button class="quick-entry" onclick="document.getElementById('input').value='持仓异动诊断';send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        自动化
      </button>
    </div>

    <!-- Session list -->
    <div class="session-section">
      <div class="session-section-header">
        <span>会话列表</span>
        <span class="actions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" onclick="newSession()"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" onclick="loadSessions()"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </span>
      </div>
      <div class="session-list" id="sessionList">
        <div class="no-sessions">暂无会话</div>
      </div>
    </div>
  </aside>
  <main id="chat">
    <div class="welcome" id="welcome">
      <h2>Project Matrix</h2>
      <p>个人智能协作网络 · 投资分析员</p>
      <div class="hints">
        <span class="hint" data-msg="诊断我的持仓异动">持仓异动诊断</span>
        <span class="hint" data-msg="做一次组合复盘">组合复盘</span>
        <span class="hint" data-msg="检查配置偏离度">配置偏离检查</span>
        <span class="hint" data-msg="当前持仓总金额是多少？">持仓总览</span>
        <span class="hint" data-msg="分析我当前的资产配置，并与目标对比">配置分析</span>
      </div>
    </div>
  </main>
</div>
<footer>
  <div class="input-row">
    <input type="text" id="input" placeholder="输入问题..." autofocus>
    <button id="send" onclick="send()">发送</button>
    <button class="reset-btn" onclick="resetSession()">重置</button>
  </div>
</footer>

<script>
const SESSION = localStorage.getItem('mx_session') || ('web-' + Math.random().toString(36).slice(2, 8));
localStorage.setItem('mx_session', SESSION);
let sending = false;

// ---- Session management ----
function loadSessions() {
  fetch('/sessions')
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('sessionList');
      const sessions = data.sessions || [];
      if (sessions.length === 0) {
        list.innerHTML = '<div class="no-sessions">暂无会话</div>';
        return;
      }
      const msgIcon = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
      list.innerHTML = sessions.map(s => {
        const active = s.id === SESSION ? ' active' : '';
        const title = escapeHtml(s.title || s.id.slice(0, 8) + '...');
        const count = s.msg_count ? s.msg_count + '条' : '';
        return '<div class="session-item' + active + '" data-sid="' + s.id + '" onclick="selectSession(\'' + s.id + '\')">' +
          msgIcon +
          '<span class="title">' + title + '</span>' +
          '<span class="meta">' + count + '</span>' +
          '<span class="del" onclick="event.stopPropagation();deleteSession(\'' + s.id + '\')">x</span>' +
          '</div>';
      }).join('');
    });
}

function newSession() {
  const id = 'web-' + Math.random().toString(36).slice(2, 8);
  localStorage.setItem('mx_session', id);
  location.reload();
}

function selectSession(id) {
  localStorage.setItem('mx_session', id);
  location.reload();
}

function deleteSession(id) {
  if (!confirm('删除此会话？')) return;
  fetch('/sessions/' + id, { method: 'DELETE' }).then(() => {
    if (id === SESSION) newSession();
    else loadSessions();
  });
}

loadSessions();
loadHistory();

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    newSession();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('input').focus();
  }
});

// ---- Load chat history on page load ----
function loadHistory() {
  fetch('/sessions/' + SESSION + '/messages')
    .then(r => r.json())
    .then(data => {
      const msgs = data.messages || [];
      if (msgs.length === 0) return;
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
      const chat = document.getElementById('chat');
      msgs.forEach(m => {
        if (m.role === 'user') {
          chat.appendChild(userBubble(m.content));
        } else {
          const div = document.createElement('div');
          div.className = 'message assistant';
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          const content = document.createElement('div');
          content.className = 'content';
          content.innerHTML = renderMarkdown(m.content);
          bubble.appendChild(content);
          div.appendChild(bubble);
          chat.appendChild(div);
        }
      });
      chat.scrollTop = chat.scrollHeight;
    });
}

document.querySelectorAll('.hint').forEach(hint => {
  hint.addEventListener('click', () => {
    document.getElementById('input').value = hint.dataset.msg;
    send();
  });
});

document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ---- Markdown renderer ----
function renderMarkdown(text) {
  if (!text) return '';
  let html = text;
  // Code blocks (fenced)
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');
  // Unordered list items
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  // Ordered list items
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>');
  // Wrap consecutive <li> in <ul> or <ol>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, (match) => {
    if (match.match(/<li>\d+\./)) return '<ol>' + match + '</ol>';
    return '<ul>' + match + '</ul>';
  });
  // Tables
  html = html.replace(/^\|(.+)\|\s*\n\|[-:| ]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, header, rows) => {
    const hcells = header.split('|').map(c => c.trim()).filter(c => c);
    let tbl = '<table><thead><tr>';
    hcells.forEach(c => { tbl += '<th>' + c + '</th>'; });
    tbl += '</tr></thead><tbody>';
    rows.trim().split('\n').forEach(row => {
      const cells = row.split('|').map(c => c.trim()).filter(c => c);
      tbl += '<tr>';
      cells.forEach(c => { tbl += '<td>' + c + '</td>'; });
      tbl += '</tr>';
    });
    tbl += '</tbody></table>';
    return tbl;
  });
  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(\s*<[^>]+>.*?<\/[^>]+>\s*)<\/p>/g, '$1');
  return html;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---- Format tool result as readable HTML ----
function formatToolResult(data) {
  let obj;
  try {
    obj = typeof data === 'string' ? JSON.parse(data) : data;
  } catch (_) {
    return '<pre>' + escapeHtml(String(data)) + '</pre>';
  }
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<pre>[]</pre>';
    // Array of objects → table
    if (typeof obj[0] === 'object' && obj[0] !== null) {
      const keys = Object.keys(obj[0]);
      let tbl = '<table><thead><tr>';
      keys.forEach(k => { tbl += '<th>' + escapeHtml(k) + '</th>'; });
      tbl += '</tr></thead><tbody>';
      obj.forEach(row => {
        tbl += '<tr>';
        keys.forEach(k => {
          let val = row[k];
          if (val === null || val === undefined) val = '-';
          else if (typeof val === 'number') {
            val = Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2);
            val = '<span class="stat">' + val + '</span>';
          }
          tbl += '<td>' + (typeof val === 'string' ? escapeHtml(val) : val) + '</td>';
        });
        tbl += '</tr>';
      });
      tbl += '</tbody></table>';
      return tbl;
    }
    return '<pre>' + escapeHtml(JSON.stringify(obj, null, 2)) + '</pre>';
  }
  if (typeof obj === 'object' && obj !== null) {
    return formatToolResultObject(obj);
  }
  return '<pre>' + escapeHtml(JSON.stringify(obj, null, 2)) + '</pre>';
}

function formatToolResultObject(obj) {
  // Special handling for holdings_summary
  if (obj.buckets && obj.holdings) {
    let html = '';

    // Bucket overview
    if (obj.buckets.length > 0) {
      html += '<h4 style="margin:8px 0 4px;color:#a78bfa;">分桶概览</h4>';
      html += '<table><thead><tr><th>分桶</th><th>数量</th><th>金额</th><th>币种</th></tr></thead><tbody>';
      obj.buckets.forEach(b => {
        html += '<tr><td>' + escapeHtml(b.name || '') + '</td>';
        html += '<td class="stat">' + (b.count || 0) + '</td>';
        html += '<td class="stat">' + formatMoney(b.total) + '</td>';
        html += '<td>' + escapeHtml(b.currency || '') + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Holdings detail
    if (obj.holdings.length > 0) {
      html += '<h4 style="margin:8px 0 4px;color:#a78bfa;">持仓明细</h4>';
      const cols = ['code', 'name', 'bucket', 'type', 'balance', 'currency'];
      html += '<table><thead><tr>';
      cols.forEach(c => { html += '<th>' + c + '</th>'; });
      html += '</tr></thead><tbody>';
      obj.holdings.forEach(h => {
        html += '<tr>';
        cols.forEach(c => {
          let val = h[c];
          if (c === 'balance') val = formatMoney(val);
          html += '<td>' + (val != null ? escapeHtml(String(val)) : '-') + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
    }
    return html;
  }

  // Generic object → key-value table
  const keys = Object.keys(obj);
  if (keys.length === 0) return '<pre>{}</pre>';
  let html = '<table><tbody>';
  keys.forEach(k => {
    let val = obj[k];
    if (typeof val === 'number') val = '<span class="stat">' + formatMoney(val) + '</span>';
    else if (val && typeof val === 'object') val = '<pre style="margin:0;font-size:11px;">' + escapeHtml(JSON.stringify(val, null, 2)) + '</pre>';
    else val = escapeHtml(String(val));
    html += '<tr><td style="color:var(--text-secondary);width:140px;">' + escapeHtml(k) + '</td><td>' + val + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function formatMoney(v) {
  if (typeof v !== 'number') return escapeHtml(String(v));
  return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ---- Send message ----
function send() {
  if (sending) return;
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sending = true;

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  chat.appendChild(userBubble(msg));
  const asst = assistantBubble();
  chat.appendChild(asst);
  chat.scrollTop = chat.scrollHeight;

  const toolCache = new Map();
  let thinking = addThinking(asst);

  const params = new URLSearchParams({
    message: encodeURIComponent(msg),
    session_id: SESSION,
  });
  const es = new EventSource('/chat/stream?' + params.toString());

  es.addEventListener('tool_call', (e) => {
    if (thinking) { thinking.remove(); thinking = null; }
    const data = JSON.parse(e.data);
    const name = data.name || '';
    toolCache.set(name, { name, args: data.args, preview: '' });
  });

  es.addEventListener('tool_result', (e) => {
    if (thinking) { thinking.remove(); thinking = null; }
    const data = JSON.parse(e.data);
    const name = data.name || '';
    const cached = toolCache.get(name);
    if (cached) {
      cached.preview = data.preview || '';
      asst.appendChild(toolSection(cached));
      toolCache.delete(name);
    }
  });

  es.addEventListener('token', (e) => {
    if (thinking) { thinking.remove(); thinking = null; }
    let content = asst.querySelector('.content');
    if (!content) {
      content = document.createElement('div');
      content.className = 'content';
      asst.appendChild(content);
    }
    const raw = (e.data ? JSON.parse(e.data).content : '') || '';
    content.innerHTML = renderMarkdown(raw);
    chat.scrollTop = chat.scrollHeight;
  });

  es.addEventListener('error', (e) => {
    if (thinking) { thinking.remove(); thinking = null; }
    try {
      const data = JSON.parse(e.data);
      asst.appendChild(errorBlock(data.message || ''));
    } catch (_) {}
  });

  es.addEventListener('done', (e) => {
    if (thinking) { thinking.remove(); thinking = null; }
    try {
      const data = JSON.parse(e.data);
      const dur = data.duration_ms ? (data.duration_ms / 1000).toFixed(1) + 's' : '';
      if (dur) {
        const durEl = document.createElement('div');
        durEl.className = 'duration';
        durEl.textContent = '耗时 ' + dur;
        asst.appendChild(durEl);
      }
    } catch (_) {}
    es.close();
    sending = false;
    document.getElementById('input').focus();
    loadSessions();
  });

  es.onerror = () => {
    if (thinking) { thinking.remove(); thinking = null; }
    es.close();
    sending = false;
    document.getElementById('input').focus();
  };
}

function addThinking(asst) {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.textContent = '思考中...';
  asst.appendChild(el);
  return el;
}

function userBubble(msg) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = '<div class="bubble">' + escapeHtml(msg) + '</div>';
  return div;
}

function assistantBubble() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="bubble"></div>';
  return div;
}

function toolSection(tool) {
  const div = document.createElement('div');
  div.className = 'tool-section';
  div.innerHTML = '<div class="tool-header" onclick="this.parentElement.classList.toggle(\'open\')"><span>&#9881;</span><span class="name">' + escapeHtml(tool.name) + '</span><span class="arrow">&#9660;</span></div><div class="tool-body">' + formatToolResult(tool.preview) + '</div>';
  return div;
}

function errorBlock(msg) {
  const div = document.createElement('div');
  div.className = 'error-block';
  div.textContent = msg;
  return div;
}

function resetSession() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/reset?session_id=' + encodeURIComponent(SESSION), true);
  xhr.onload = function() {
    loadSessions();
    document.getElementById('chat').innerHTML = '<div class="welcome" id="welcome"><h2>Project Matrix</h2><p>个人智能协作网络 · 投资分析员</p><div class="hints"><span class="hint" data-msg="诊断我的持仓异动">持仓异动诊断</span><span class="hint" data-msg="做一次组合复盘">组合复盘</span><span class="hint" data-msg="检查配置偏离度">配置偏离检查</span><span class="hint" data-msg="当前持仓总金额是多少？">持仓总览</span><span class="hint" data-msg="分析我当前的资产配置，并与目标对比">配置分析</span></div></div>';
    document.querySelectorAll('.hint').forEach(function(h) {
      h.addEventListener('click', function() {
        document.getElementById('input').value = h.dataset.msg;
        send();
      });
    });
  };
  xhr.send();
}
</script>
</body>
</html>

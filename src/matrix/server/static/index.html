<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix</title>
<style>
  :root {
    --bg: #f5f5f7;
    --bg2: #e8e8ed;
    --surface: #ffffff;
    --border: #e5e5ea;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #34c759;
    --warning: #ff9500;
    --error: #ff3b30;
    --tool-call: #f0f0f5;
    --tool-result: #e8e8ed;
    --radius: 8px;
    --code-bg: #f0f0f5;
    --table-stripe: #f5f5f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  /* ---- Sidebar ---- */
  .layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .sidebar {
    width: var(--sidebar-width, 220px);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    min-height: 0;
    padding: 0;
    -webkit-user-select: none;
    user-select: none;
    border-right: 1px solid var(--border);
  }
  .sb-top {
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 0 0 auto;
  }
  .new-session-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: rgba(99,102,241,0.08);
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    transition: background 0.12s;
  }
  .new-session-btn:hover { background: rgba(99,102,241,0.2); }
  .new-session-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  /* Section headers */
  .sb-section {
    display: flex;
    flex-direction: column;
    padding: 8px 0;
    border-top: 1px solid var(--border);
    overflow: hidden;
    flex-grow: 0;
    flex-shrink: 0;
    min-height: 0;
  }
  .sb-section.sb-skills {
    flex: 0 0 auto;
    min-height: 0;
  }
  .sb-hints-body { transition: max-height 0.2s ease, opacity 0.15s; overflow: hidden; }
  .sb-hints-body.collapsed { max-height: 0; opacity: 0; padding: 0; display: none; }
  .sb-skills-body { transition: max-height 0.2s ease, opacity 0.15s; overflow: hidden; }
  .sb-skills-body.collapsed { max-height: 0; opacity: 0; padding: 0; display: none; }
  .sb-mcp-body { transition: max-height 0.2s ease, opacity 0.15s; overflow: hidden; }
  .sb-mcp-body.collapsed { max-height: 0; opacity: 0; padding: 0; display: none; }
  .sb-hint { display: block; padding: 6px 16px 6px 28px; font-size: 12px; cursor: pointer; color: var(--text-secondary); transition: color 0.15s; }
  .sb-hint:hover { color: var(--text); }
  .sb-section.sb-sessions {
    flex: 1 1 0%;
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
  }
  .sb-section.sb-sessions .sb-list {
    flex: 1 1 0%;
    min-height: 0;
  }
  .sb-section-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 16px 6px;
    cursor: pointer;
    user-select: none;
  }
  .sb-section-hd span {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .sb-chevron {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: var(--text-secondary);
    opacity: 0.5;
    transition: transform 0.15s;
  }
  .sb-chevron.collapsed { transform: rotate(-90deg); }
  .sb-skills-body { transition: max-height 0.2s ease, opacity 0.15s; overflow: hidden; }
  .sb-skills-body.collapsed { max-height: 0; opacity: 0; padding: 0; }
  .sb-actions { display: flex; gap: 8px; }
  .sb-actions svg {
    width: 13px; height: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    opacity: 0.4;
  }
  .sb-actions svg:hover { opacity: 1; }
  .sb-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 0 8px;
  }
  .sb-list .no-sessions {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
    padding: 16px 8px;
    opacity: 0.6;
  }
  /* Skill items */
  .sb-skill-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.1s, color 0.1s;
  }
  .sb-skill-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .sb-skill-item svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
  .sb-skill-item .actions { display: none; gap: 4px; margin-left: auto; }
  .sb-skill-item:hover .actions { display: flex; }
  .sb-skill-item .actions svg { width: 12px; height: 12px; cursor: pointer; }
  .sb-skill-item .actions svg:hover { opacity: 1; }
  /* Session items */
  .sb-session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.1s, color 0.1s;
  }
  .sb-session-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .sb-session-item.active { background: rgba(99,102,241,0.08); color: var(--text); }
  .sb-session-item .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .sb-session-item .meta { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; opacity: 0.6; }
  .sb-session-item .del { display: none; font-size: 11px; padding: 2px; cursor: pointer; opacity: 0.4; flex-shrink: 0; }
  .sb-session-item:hover .del { display: block; }
  .sb-session-item .del:hover { opacity: 1; color: var(--error); }
  /* ---- Right Panel ---- */
  .rpanel {
    width: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    padding: 0;
    gap: 16px;
    border-left: 1px solid transparent;
    transition: width 0.25s ease, padding 0.25s ease, border-color 0.25s ease;
  }
  .rpanel.open {
    width: var(--rpanel-width, 240px);
    padding: 16px 12px;
    border-left-color: var(--border);
    overflow-y: auto;
  }
  .rpanel-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rpanel-header {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .rpanel-content {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.7;
  }
  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 24px;
    width: 520px;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin: 0 0 16px; color: var(--text); }
  .modal label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin: 12px 0 4px; }
  .modal input, .modal textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box;
    background: var(--bg); color: var(--text);
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal .btn-row button { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
  .modal .btn-row .btn-primary { background: var(--accent); color: #fff; }
  .modal .btn-row .btn-cancel { background: var(--border); color: var(--text-secondary); }
  /* Skill detail modal */
  .sd-field { margin-bottom: 20px; }
  .sd-field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .sd-field input:focus, .sd-field textarea:focus { border-color: var(--accent); }
  /* Skill detail file section */
  .modal-input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box;
    background: var(--bg); color: var(--text);
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box;
    background: var(--bg); color: var(--text); resize: vertical; min-height: 50px;
  }
  .modal-textarea:focus { border-color: var(--accent); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .modal-close:hover { color: var(--text); }
  .sd-file-row { display: flex; align-items: center; gap: 4px; font-size: 13px; padding: 4px 0; }
  .sd-file-row svg { width: 14px; height: 14px; color: var(--text-secondary); }
  .sd-file-row .del-btn { margin-left: auto; cursor: pointer; color: var(--text-secondary); }
  .sd-file-row .del-btn:hover { color: var(--error); }
  .sd-file-add { display: flex; gap: 6px; margin-bottom: 20px; }
  .sd-file-add input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
  .sd-file-add input:focus { border-color: var(--accent); }
  .sd-file-add button { background: var(--border); border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  /* Footer model selector (per-session, next to send button) */
  .footer-model {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .footer-model:hover { border-color: var(--accent); }
  .footer-model svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
  .footer-model .model-name { color: var(--text); font-weight: 500; font-size: 12px; }
  .footer-model .chevron { width: 10px; height: 10px; color: var(--text-secondary); }
  .footer-model-dropdown {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 200px;
    max-height: 420px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
  }
  .footer-model-dropdown.show { display: block; }
  .footer-model-dropdown .item {
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-secondary);
    transition: background 0.1s;
  }
  .footer-model-dropdown .item:hover { background: rgba(99,102,241,0.08); color: var(--text); }
  .footer-model-dropdown .item.active { background: rgba(99,102,241,0.08); color: var(--accent); }
  .footer-model-dropdown .item .check { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
  .footer-model-dropdown .item .desc { font-size: 10px; color: var(--text-secondary); margin-left: auto; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 0;
  }
  .main-inner {
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message { max-width: 800px; width: 100%; margin: 0 auto; }
  .message.user { margin-right: 0; margin-left: auto; }
  .message.user .bubble { background: var(--accent); padding: 10px 16px; border-radius: var(--radius); display: inline-block; max-width: 85%; text-align: left; font-size: 14px; line-height: 1.6; }
  .message.assistant { margin-right: auto; margin-left: 0; }
  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.85;
    max-width: 100%;
    overflow-x: auto;
  }
  .message.assistant .bubble:empty { display: none; }
  /* Agent execution chain */
  .agent-chain {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 8px;
    padding: 0;
  }
  .agent-step {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .agent-step .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .agent-step.running { border-color: var(--accent); color: var(--accent); }
  .agent-step.running .dot { background: var(--accent); animation: pulse 1.2s infinite; }
  .agent-step.done { border-color: #34c759; color: #34c759; }
  .agent-step.done .dot { background: #34c759; }
  .agent-step.error { border-color: #ff3b30; color: #ff3b30; }
  .agent-step.error .dot { background: #ff3b30; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .agent-step-name { font-weight: 600; }
  .agent-step-task { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Markdown content styles */
  .content h1, .content h2, .content h3 { margin: 20px 0 10px; font-weight: 600; }
  .content h1 { font-size: 1.25em; }
  .content h2 { font-size: 1.1em; }
  .content h3 { font-size: 1.02em; }
  .content p { margin: 8px 0; }
  .content ul, .content ol { margin: 8px 0; padding-left: 22px; }
  .content li { margin: 4px 0; }
  .content strong { color: var(--text); font-weight: 600; }
  .content em { color: var(--accent); }
  .content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.9em;
    color: var(--accent);
  }
  .content pre {
    background: var(--code-bg);
    padding: 14px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--border);
  }
  .content pre code { padding: 0; background: none; color: var(--text-secondary); }
  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 14px;
    margin: 8px 0;
    color: var(--text-secondary);
    background: rgba(99,102,241,0.05);
    border-radius: 0 4px 4px 0;
  }
  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 13px;
  }
  .content th, .content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .content th { background: var(--code-bg); font-weight: 600; color: var(--text); }
  .content tr:nth-child(even) td { background: var(--table-stripe); }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .content a { color: var(--accent-hover); }
  /* Tool section */
  .tool-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 6px 0;
    overflow: hidden;
  }
  .tool-header {
    background: var(--tool-call);
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .tool-header .name { font-family: monospace; color: var(--warning); }
  .tool-header .arrow { margin-left: auto; transition: transform 0.15s; }
  .tool-section.open .tool-header .arrow { transform: rotate(180deg); }
  .tool-body {
    background: var(--tool-result);
    padding: 0;
    font-size: 12px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease-out, padding 0.2s;
  }
  .tool-section.open .tool-body {
    max-height: 400px;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .tool-body pre {
    margin: 0;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }
  .tool-body table { width: 100%; border-collapse: collapse; margin: 0; }
  .tool-body th, .tool-body td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; font-size: 12px; }
  .tool-body th { background: var(--code-bg); color: var(--text); }
  .tool-body .stat { color: var(--warning); font-weight: 600; }
  .thinking-group {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 8px 0;
    overflow: hidden;
  }
  .thinking-group-header {
    background: var(--tool-call);
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .thinking-group-header .arrow { margin-left: auto; transition: transform 0.15s; }
  .thinking-group.open .thinking-group-header .arrow { transform: rotate(180deg); }
  .thinking-group-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease-out;
  }
  .thinking-group.open .thinking-group-body {
    max-height: 2000px;
    overflow-y: auto;
  }
  .thinking-group-body .tool-section {
    border: none;
    border-top: 1px solid var(--border);
    border-radius: 0;
    margin: 0;
  }
  .thinking-text {
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    background: var(--tool-result);
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }
  .thinking { display: none; }
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0 20px 12px 20px;
    flex-shrink: 0;
  }
  .status-bar {
    font-size: 12px;
    color: var(--text-secondary);
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
  }
  .status-bar.active { display: flex; }
  .status-bar .dots { display: inline-flex; gap: 4px; }
  .status-bar .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .status-bar .dots span:nth-child(2) { animation-delay: 0.2s; }
  .status-bar .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8);} 40%{opacity:1;transform:scale(1.2);} }
  .input-row { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; }
  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-secondary); }
  .input-row button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;

  /* Image upload button */

<script>
// ---- Auth / Token Management ----
const AUTH_TOKEN_KEY = 'mx_token';

function getToken() {
  return localStorage.getItem(AUTH_TOKEN_KEY);
}

function setToken(token) {
  localStorage.setItem(AUTH_TOKEN_KEY, token);
}

function clearToken() {
  localStorage.removeItem(AUTH_TOKEN_KEY);
}

async function checkAuthStatus() {
  const token = getToken();
  if (!token) {
    showLogin();
    return false;
  }
  hideLogin();
  return true;
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('loginUsername').focus();
}

function hideLogin() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('traceBtn').style.display = '';
}

async function handleLogin() {
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  btn.disabled = true;
  btn.textContent = '登录中...';
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password }),
    });
    const data = await resp.json();
    if (resp.ok && data.token) {
      setToken(data.token);
      hideLogin();
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginUsername').value = '';
      errEl.style.display = 'none';
      // Reload after login
      loadProviders();
      loadSessions();
      loadHistory();
      loadSkills();
    } else {
      errEl.textContent = data.detail || '用户名或密码错误';
      errEl.style.display = 'block';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginUsername').focus();
    }
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
  return false;
}

function switchAuthTab(tab) {
  const tabs = document.querySelectorAll('.login-tab');
  const forms = document.querySelectorAll('.login-form');
  tabs.forEach(t => t.classList.toggle('active', t.textContent === (tab === 'login' ? '登录' : '注册')));
  forms.forEach(f => {
    const isLogin = f.id === 'loginForm';
    f.classList.toggle('active', (tab === 'login' && isLogin) || (tab === 'register' && !isLogin));
  });
  // Clear errors and focus first input of active form
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('registerError').style.display = 'none';
  if (tab === 'login') {
    document.getElementById('loginUsername').focus();
  } else {
    document.getElementById('regUsername').focus();
  }
}

async function handleRegister() {
  const btn = document.getElementById('registerBtn');
  const errEl = document.getElementById('registerError');
  btn.disabled = true;
  btn.textContent = '注册中...';
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regPasswordConfirm').value;

  if (password !== confirm) {
    errEl.textContent = '两次密码不一致';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '注册';
    return false;
  }

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password }),
    });
    const data = await resp.json();
    if (resp.ok && data.token) {
      setToken(data.token);
      hideLogin();
      document.getElementById('regPassword').value = '';
      document.getElementById('regPasswordConfirm').value = '';
      document.getElementById('regUsername').value = '';
      errEl.style.display = 'none';
      loadProviders();
      loadSessions();
      loadHistory();
      loadSkills();
    } else {
      errEl.textContent = data.detail || '注册失败';
      errEl.style.display = 'block';
      document.getElementById('regPassword').value = '';
      document.getElementById('regPasswordConfirm').value = '';
      document.getElementById('regUsername').focus();
    }
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '注册';
  }
  return false;
}

async function handleLogout() {

// Override fetch to inject Authorization header
const _origFetch = window.fetch;
window.fetch = function(url, options) {
  const token = getToken();
  if (token) {
    options = options || {};
    options.headers = options.headers || {};
    if (!options.headers['Authorization']) {
      options.headers['Authorization'] = 'Bearer ' + token;
    }
  }
  return _origFetch(url, options).then(function(resp) {
    // If token expired (401), redirect to login
    if (resp.status === 401) {
      clearToken();
      showLogin();
    }
    return resp;
  });
};

  },
  imageSanitizer: function(url) {
    return sanitizeUrl(url);
  },
});

// ---- HTML sanitizer for XSS protection ----
function sanitizeHtml(html) {
  const el = document.createElement('div');
  el.textContent = html;
  return el.innerHTML;
}

function sanitizeUrl(url) {
  const allowed = /^(https?:|data:image\/)/i;
  if (!allowed.test(url)) return '#';
  // Strip javascript: and other dangerous protocols
  if (/^javascript:/i.test(url)) return '#';
  return url;
}

      displayName = model ? model.name : modelId;

  if (_imageModels.length > 0) {

    _imageModels.forEach(function(prov) {
      html += '<div class="prov-group" style="padding:6px 14px 2px;font-size:10px;font-weight:600;color:#f59e0b;text-transform:uppercase;letter-spacing:0.5px">' + prov.name + ' · 图像生成</div>';

          '<span>' + m.name + '</span>' +
          '<span class="desc">' + m.desc + '</span>' +

      });
    });

  // Separator + Video models
  if (_videoModels.length > 0) {
    html += '<div style="margin:4px 14px;border-top:1px solid var(--border)"></div>';
    _videoModels.forEach(function(prov) {
      html += '<div class="prov-group" style="padding:6px 14px 2px;font-size:10px;font-weight:600;color:#ef4444;text-transform:uppercase;letter-spacing:0.5px">' + prov.name + ' · 视频生成</div>';

function switchModel(providerId, modelId) {
  const key = providerId + ':' + modelId;
  if (key === currentModel) return;
  fetch('/api/provider?token=' + encodeURIComponent(getToken()), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ provider: providerId, model: modelId, session_id: SESSION }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        currentModel = data.provider + ':' + (data.model || '');
        updateFooterModel();
        document.getElementById('modelDropdown').classList.remove('show');
      } else {
        alert('切换失败: ' + (data.error || 'unknown'));
        loadProviders();
      }
    })
    .catch(err => {
      alert('切换失败: ' + err.message);
      loadProviders();
    });
}

function saveMcpServer(serverName) {
  var name = document.getElementById('mcpName').value.trim();
  var transport = document.getElementById('mcpTransport').value;
  var command = document.getElementById('mcpCommand').value.trim();
  var argsStr = document.getElementById('mcpArgs').value.trim();
  var url = document.getElementById('mcpUrl').value.trim();
  var envStr = document.getElementById('mcpEnv').value.trim();
  var timeout = parseFloat(document.getElementById('mcpTimeout').value) || 60;

  if (!name) { alert('名称不能为空'); return; }

  var args = argsStr ? argsStr.split(/\s+/) : [];

  // Parse env pairs
  var env = {};
  if (envStr) {
    envStr.split('\n').forEach(function(line) {
      line = line.trim();
      if (!line) return;
      var idx = line.indexOf('=');
      if (idx > 0) {
        env[line.substring(0, idx).trim()] = line.substring(idx + 1).trim();
      }
    });
  }

  var payload = {
    name: name,
    transport: transport,
    args: args,
    env: env,
    enabled: true,
    timeout: timeout,
  };
  if (transport === 'stdio') {
    payload.command = command;
  } else {
    payload.url = url;
  }

  var method = serverName ? 'PUT' : 'POST';
  var url_path = serverName
    ? '/mcp/servers/' + encodeURIComponent(serverName)
    : '/mcp/servers';

  fetch(url_path + '?token=' + encodeURIComponent(getToken()), {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(r => r.json()).then(d => {
    closeModal();
    if (d.error) { alert(d.error); return; }
    loadMcpServers();
  }).catch(err => {
    alert('保存失败: ' + err.message);
  });
}

function deleteMcpServer(name) {
  if (!confirm('删除 MCP 服务 "' + name + '"？将断开连接并移除配置。')) return;
  fetch('/mcp/servers/' + encodeURIComponent(name) + '?token=' + encodeURIComponent(getToken()), {
    method: 'DELETE',
  }).then(r => r.json()).then(d => {
    if (d.error) { alert(d.error); return; }
    loadMcpServers();

}

function toggleMcpServer(name) {
  fetch('/mcp/servers/' + encodeURIComponent(name) + '/toggle?token=' + encodeURIComponent(getToken()), {
    method: 'POST',
  }).then(r => r.json()).then(d => {

// ---- Markdown renderer using marked.js (better compatibility) ----
function renderMarkdown(text) {
  if (!text) return '';
  // Use marked.js to parse Markdown
  let html = marked.parse(text);
  // Convert video img tags (generated from ![alt](video_url)) to <video> elements
  // marked.js renders all ![alt](url) as <img> — but video URLs should be <video>
  const temp = document.createElement('div');
  temp.innerHTML = html;
  temp.querySelectorAll('img').forEach(img => {
    const alt = (img.getAttribute('alt') || '');
    const src = img.getAttribute('src') || '';
    const isVideo = src && /视频|video|\.(mp4|webm|mov|avi|mkv)($|\?)/i.test(alt + '|' + src);
    if (isVideo) {
      const video = document.createElement('video');
      video.setAttribute('controls', '');
      video.setAttribute('src', src);
      video.style.cssText = 'max-width:100%;max-height:400px;border-radius:8px;margin:6px 0';
      if (alt) video.setAttribute('title', alt);
      img.replaceWith(video);
    }
  });
  return temp.innerHTML;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---- Format tool result as readable HTML ----
function formatToolResult(data) {
  let obj;
  try {
    obj = typeof data === 'string' ? JSON.parse(data) : data;
  } catch (_) {
    return '<pre>' + escapeHtml(String(data)) + '</pre>';
  }
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<pre>[]</pre>';
    // Array of objects → table
    if (typeof obj[0] === 'object' && obj[0] !== null) {
      const keys = Object.keys(obj[0]);
      let tbl = '<table><thead><tr>';
      keys.forEach(k => { tbl += '<th>' + escapeHtml(k) + '</th>'; });
      tbl += '</tr></thead><tbody>';
      obj.forEach(row => {
        tbl += '<tr>';
        keys.forEach(k => {
          let val = row[k];
          if (val === null || val === undefined) val = '-';
          else if (typeof val === 'number') {
            val = Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2);
            val = '<span class="stat">' + val + '</span>';
          }
          tbl += '<td>' + (typeof val === 'string' ? escapeHtml(val) : val) + '</td>';
        });
        tbl += '</tr>';
      });
      tbl += '</tbody></table>';
      return tbl;
    }
    return '<pre>' + escapeHtml(JSON.stringify(obj, null, 2)) + '</pre>';
  }
  if (typeof obj === 'object' && obj !== null) {
    return formatToolResultObject(obj);
  }
  return '<pre>' + escapeHtml(JSON.stringify(obj, null, 2)) + '</pre>';
}

function formatToolResultObject(obj) {
  // Image generation results: show actual images
  if (obj.images && Array.isArray(obj.images) && obj.images.length > 0) {
    let html = '';
    if (obj.prompt) html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">&#x1F3A8; ' + escapeHtml(obj.prompt) + '</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:10px">';
    obj.images.forEach(img => {
      if (img.url) {
        const safeUrl = sanitizeUrl(img.url);
        html += '<a href="' + escapeHtml(safeUrl) + '" target="_blank"><img src="' + escapeHtml(safeUrl) + '" alt="' + escapeHtml(obj.prompt || '') + '" style="max-width:300px;max-height:300px;border-radius:6px;border:1px solid var(--border);cursor:zoom-in" loading="lazy"></a>';
      }
    });
    html += '</div>';
    if (obj.size) html += '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px">尺寸: ' + escapeHtml(obj.size) + ' | 数量: ' + (obj.count || obj.images.length) + '</div>';
    return html;
  }
  // Video generation results: show video player
  if (obj.videos && Array.isArray(obj.videos) && obj.videos.length > 0) {
    let html = '';
    if (obj.prompt) html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">&#x1F3AC; ' + escapeHtml(obj.prompt) + '</div>';
    obj.videos.forEach(v => {
      if (v.url) {
        const safeUrl = sanitizeUrl(v.url);
        html += '<video controls style="max-width:100%;max-height:400px;border-radius:8px;margin:6px 0" src="' + escapeHtml(safeUrl) + '"></video>';
      }
    });
    if (obj.duration) html += '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px">时长: ' + obj.duration + 's | 分辨率: ' + escapeHtml(obj.resolution || '') + '</div>';
    return html;
  }
  // Special handling for holdings_summary
  if (obj.buckets && obj.holdings) {
    let html = '';

    // Bucket overview
    if (obj.buckets.length > 0) {
      html += '<h4 style="margin:8px 0 4px;color:var(--accent);">分桶概览</h4>';
      html += '<table><thead><tr><th>分桶</th><th>数量</th><th>金额</th><th>币种</th></tr></thead><tbody>';
      obj.buckets.forEach(b => {
        html += '<tr><td>' + escapeHtml(b.name || '') + '</td>';
        html += '<td class="stat">' + (b.count || 0) + '</td>';
        html += '<td class="stat">' + formatMoney(b.total) + '</td>';
        html += '<td>' + escapeHtml(b.currency || '') + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Holdings detail
    if (obj.holdings.length > 0) {
      html += '<h4 style="margin:8px 0 4px;color:var(--accent);">持仓明细</h4>';
      const cols = ['code', 'name', 'bucket', 'type', 'balance', 'currency'];
      html += '<table><thead><tr>';
      cols.forEach(c => { html += '<th>' + c + '</th>'; });
      html += '</tr></thead><tbody>';
      obj.holdings.forEach(h => {
        html += '<tr>';
        cols.forEach(c => {
          let val = h[c];
          if (c === 'balance') val = formatMoney(val);
          html += '<td>' + (val != null ? escapeHtml(String(val)) : '-') + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
    }
    return html;
  }

  // Generic object → key-value table
  const keys = Object.keys(obj);
  if (keys.length === 0) return '<pre>{}</pre>';
  let html = '<table><tbody>';
  keys.forEach(k => {
    let val = obj[k];
    if (typeof val === 'number') val = '<span class="stat">' + formatMoney(val) + '</span>';
    else if (val && typeof val === 'object') val = '<pre style="margin:0;font-size:11px;">' + escapeHtml(JSON.stringify(val, null, 2)) + '</pre>';
    else val = escapeHtml(String(val));
    html += '<tr><td style="color:var(--text-secondary);width:140px;">' + escapeHtml(k) + '</td><td>' + val + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function formatMoney(v) {
  if (typeof v !== 'number') return escapeHtml(String(v));
  return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ---- File upload ----
async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  // 10MB limit
  if (file.size > 10 * 1024 * 1024) {
    showError('文件大小不能超过 10MB');
    input.value = '';
    return;
  }
  const formData = new FormData();
  formData.append('file', file);
  try {
    const token = getToken();
    const resp = await fetch('/api/upload', {
      method: 'POST',
      headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      body: formData,
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || '上传失败 (' + resp.status + ')');
    }
    const data = await resp.json();
    pendingFileId = data.file_id;
    // Show preview
    const preview = document.getElementById('filePreview');
    const thumb = document.getElementById('fpThumb');
    const name = document.getElementById('fpName');
    if (data.is_image) {
      // Use base64 data directly as thumbnail
      const mime = data.mime_type || 'image/png';
      thumb.src = 'data:' + mime + ';base64,' + data.base64;
      thumb.style.display = 'block';
    } else {
      thumb.style.display = 'none';
    }
    name.textContent = data.filename + ' (' + (data.size / 1024).toFixed(1) + 'KB)';
    preview.classList.add('show');
  } catch (e) {
    showError('上传失败: ' + e.message);
  } finally {
    input.value = '';
  }
}

function clearFile() {
  pendingFileId = null;
  document.getElementById('filePreview').classList.remove('show');
  document.getElementById('fpThumb').src = '';
}

function showError(msg) {
  const chat = document.getElementById('chat');
  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = 'error-block';
  div.textContent = msg;
  inner.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Paste image support
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) {
        // Create a File with proper name
        const named = new File([file], 'pasted-' + Date.now() + '.png', { type: file.type });
        const dt = new DataTransfer();
        dt.items.add(named);
        document.getElementById('fileInput').files = dt.files;
        uploadFile(document.getElementById('fileInput'));
        e.preventDefault();
        break;
      }
    }
  }
});

// ---- Send message ----
let pendingFileId = null;  // uploaded file_id awaiting to be sent with message

function send() {
  if (sending) return;
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sending = true;

  // Capture and clear pending file
  const fileId = pendingFileId;
  pendingFileId = null;
  document.getElementById('filePreview').classList.remove('show');

  // Reset right panel
  resetRPanel();
  // Track tool names for reference panel
  let rpTools = [];
  // Track execution chain in chat
  let executionChain = [];

  const chat = document.getElementById('chat');
  const inner = document.getElementById('chatInner');
  inner.appendChild(userBubble(msg));
  const asst = assistantBubble();
  inner.appendChild(asst);
  chat.scrollTop = chat.scrollHeight;

  const toolCache = new Map();
  // Status bar: appears below assistant bubble in chat
  const statusBar = document.createElement('div');
  statusBar.className = 'status-bar';
  asst.appendChild(statusBar);
  setStatus(statusBar, '思考中...');
  // Right panel tracking
  let rpSteps = [];
  let rpTodos = [];

  const params = new URLSearchParams({
    message: encodeURIComponent(msg),
    session_id: SESSION,
  });
  if (fileId) params.set('file_id', fileId);
  // EventSource doesn't support custom headers, pass token as query param
  const token = getToken();
  const streamUrl = '/chat/stream?' + params.toString() + (token ? '&token=' + encodeURIComponent(token) : '');
  const es = new EventSource(streamUrl);

  es.addEventListener('classify', (e) => {
    document.getElementById('rpanel').classList.add('open');
    const data = JSON.parse(e.data);
    let title = data.intent === 'simple' ? '\u76f4\u63a5\u56de\u7b54' :
                data.intent === 'delegate' ? '\u591a Agent \u534f\u540c' :
                data.intent === 'skill' ? '\u6280\u80fd: ' + data.skill_name : '\u5206\u6790\u4e2d';
    setRPTodo(title);
    // Build agent execution chain in chat (skip if only commander — internal fallback)
    const isCommanderOnly = data.delegation_plan && data.delegation_plan.length === 1 && data.delegation_plan[0].agent_id === 'commander';
    if (data.delegation_plan && data.delegation_plan.length > 0 && !isCommanderOnly) {
      // Remove any existing chain (safety: prevent duplicates from duplicate classify events)
      const oldChain = asst.querySelector('.agent-chain');
      if (oldChain) oldChain.remove();
      executionChain.length = 0;
      const chain = document.createElement('div');
      chain.className = 'agent-chain';
      const steps = data.delegation_plan.map(p => p.agent_id + ': ' + p.task).join(' | ');
      const agents = data.delegation_plan.map(p => p.agent_id);
      const names = data.delegation_plan.map(p => p.agent_id === 'commander' ? '\u6307\u6325\u5b98' : p.agent_id === 'investment-analyst' ? '\u6295\u8d44\u5206\u6790\u5458' : p.agent_id === 'media-generator' ? '\u5a92\u4f53\u751f\u6210\u5668' : p.agent_id);
      setRPRef('plan', steps);
      for (let i = 0; i < data.delegation_plan.length; i++) {
        const p = data.delegation_plan[i];
        const chip = document.createElement('span');
        chip.className = 'agent-step';
        chip.id = 'agent-step-' + i;
        chip.innerHTML = '<span class="dot"></span><span class="agent-step-name">' + escapeHtml(names[i]) + '</span>';
        chain.appendChild(chip);
        executionChain.push({ el: chip, agentId: p.agent_id, task: p.task, done: false });
      }
      // Mark first step as running
      if (executionChain.length > 0) executionChain[0].el.classList.add('running');
      asst.prepend(chain);
    }
    rpTools = [];
  });

  es.addEventListener('tool_call', (e) => {
    setStatus(statusBar, '\u6267\u884c\u4e2d...');
    const data = JSON.parse(e.data);
    const name = data.name || '';
    toolCache.set(name, { name, args: data.args, preview: '' });
    rpTools.push(name);
    setRPRef('tools', rpTools.join(', '));
    // Ensure thinking group exists
    ensureThinkingGroup(asst);
  });

  es.addEventListener('thinking', (e) => {
    const data = JSON.parse(e.data);
    const content = data.content || '';
    if (!content) return;
    const grp = ensureThinkingGroup(asst);
    const body = grp.querySelector('.thinking-group-body');
    // Add thinking text entry
    const div = document.createElement('div');
    div.className = 'thinking-text';
    div.textContent = content;
    body.appendChild(div);
    // Update tool count in header
    updateThinkingGroupHeader(grp);
    chat.scrollTop = chat.scrollHeight;
  });

  es.addEventListener('tool_result', (e) => {
    setStatus(statusBar, '执行中...');
    const data = JSON.parse(e.data);
    const name = data.name || '';
    const cached = toolCache.get(name);
    if (cached) {
      cached.preview = data.preview || '';
      const grp = ensureThinkingGroup(asst);
      grp.querySelector('.thinking-group-body').appendChild(toolSection(cached));
      toolCache.delete(name);
      updateThinkingGroupHeader(grp);
    }
    addRPArtifact(name, data.preview || '');
  });

  es.addEventListener('token', (e) => {
    setStatus(statusBar, '生成中...');
    // Collapse thinking group when final answer starts
    const tg = asst.querySelector('.thinking-group');
    if (tg && tg.classList.contains('open')) {
      tg.classList.remove('open');
    }
    let content = asst.querySelector('.content');
    if (!content) {
      content = document.createElement('div');
      content.className = 'content';
      asst.appendChild(content);
    }
    const raw = (e.data ? JSON.parse(e.data).content : '') || '';
    // Accumulate tokens for streaming support
    if (!content._accumulated) content._accumulated = '';
    content._accumulated += raw;
    content.innerHTML = renderMarkdown(content._accumulated);
    chat.scrollTop = chat.scrollHeight;
  });

  es.addEventListener('agent_result', (e) => {
    setStatus(statusBar, '\u6267\u884c\u4e2d...');
    const data = JSON.parse(e.data);
    const aid = data.agent_id || '';
    const task = data.task || '';
    if (aid) {
      setRPRef('agent', aid + ': ' + task);
    }
    // Update execution chain
    const step = executionChain.find(s => s.agentId === aid && !s.done);
    if (step) {
      step.done = true;
      step.el.classList.remove('running');
      step.el.classList.add(data.error ? 'error' : 'done');
      if (data.result) {
        step.el.title = data.result.substring(0, 200);
      }
    }
    // Mark next pending step as running
    const next = executionChain.find(s => !s.done);
    if (next) {
      next.el.classList.add('running');
    } else {
      // All steps done — hide all chains immediately
      asst.querySelectorAll('.agent-chain').forEach(c => c.style.display = 'none');
    }
    if (data.error) {
      addRPArtifact(aid + '-error', data.error);
    }
  });

  es.addEventListener('error', (e) => {
    hideStatus(statusBar);
    asst.querySelectorAll('.agent-chain').forEach(c => c.style.display = 'none');
    executionChain.forEach(s => s.el.classList.remove('running'));
    document.getElementById('rpanel').classList.remove('open');
    try {
      const data = JSON.parse(e.data);
      asst.appendChild(errorBlock(data.message || ''));
    } catch (_) {}
  });

  es.addEventListener('done', (e) => {
    hideStatus(statusBar);
    // Hide all agent chains — internal orchestration, not for end users
    asst.querySelectorAll('.agent-chain').forEach(c => c.style.display = 'none');
    // Ensure no running animation remains
    executionChain.forEach(s => s.el.classList.remove('running'));
    try {
      const data = JSON.parse(e.data);
      const dur = data.duration_ms ? (data.duration_ms / 1000).toFixed(1) + 's' : '';
      if (dur) {
        const durEl = document.createElement('div');
        durEl.className = 'duration';
        durEl.textContent = '\u8017\u65f6 ' + dur;
        asst.appendChild(durEl);
      }
    } catch (_) {}
    es.close();
    sending = false;
    document.getElementById('input').focus();
    loadSessions();
  });

  es.onerror = () => {
    hideStatus(statusBar);
    asst.querySelectorAll('.agent-chain').forEach(c => c.style.display = 'none');
    executionChain.forEach(s => s.el.classList.remove('running'));
    es.close();
    sending = false;
    document.getElementById('input').focus();
  };
}

function setStatus(el, text) {
  el.className = 'status-bar active';
  el.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> ' + text;
}

function hideStatus(el) {
  el.className = 'status-bar';
  el.innerHTML = '';
}

function addThinking(asst) { return null; }  // deprecated, kept for compatibility

// ---- Thinking Group (parent accordion for tool calls + reasoning) ----

function ensureThinkingGroup(asst) {
  let grp = asst.querySelector('.thinking-group');
  if (!grp) {
    grp = document.createElement('div');
    grp.className = 'thinking-group open';
    grp.innerHTML = '<div class="thinking-group-header" onclick="this.parentElement.classList.toggle(\'open\')"><span>&#128161;</span><span class="name">思考过程</span><span class="arrow">&#9660;</span></div><div class="thinking-group-body"></div>';
    // Insert before any existing content div
    const content = asst.querySelector('.content');
    if (content) {
      asst.insertBefore(grp, content);
    } else {
      asst.appendChild(grp);
    }
  }
  return grp;
}

function updateThinkingGroupHeader(grp) {
  const header = grp.querySelector('.thinking-group-header .name');
  const body = grp.querySelector('.thinking-group-body');
  const toolCount = body.querySelectorAll('.tool-section').length;
  const thinkCount = body.querySelectorAll('.thinking-text').length;
  const parts = [];
  if (thinkCount > 0) parts.push(thinkCount + ' 步思考');
  if (toolCount > 0) parts.push(toolCount + ' 次工具调用');
  header.textContent = '思考过程' + (parts.length > 0 ? ' · ' + parts.join(' · ') : '');
}

function userBubble(msg) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = '<div class="bubble">' + escapeHtml(msg) + '</div>';
  return div;
}

function assistantBubble() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="bubble"></div>';
  return div;
}

function toolSection(tool) {
  const div = document.createElement('div');
  div.className = 'tool-section';
  div.innerHTML = '<div class="tool-header" onclick="this.parentElement.classList.toggle(\'open\')"><span>&#9881;</span><span class="name">' + escapeHtml(tool.name) + '</span><span class="arrow">&#9660;</span></div><div class="tool-body">' + formatToolResult(tool.preview) + '</div>';
  return div;
}

function errorBlock(msg) {
  const div = document.createElement('div');
  div.className = 'error-block';
  div.textContent = msg;
  return div;
}

// ---- Right Panel Helpers ----

function resetRPanel() {
  document.getElementById('rpTodo').innerHTML = '<span style="color:var(--text-secondary)">暂无待办</span>';
  document.getElementById('rpArtifacts').innerHTML = '<span style="color:var(--text-secondary)">暂无产物</span>';
  document.getElementById('rpRef').innerHTML = '<span style="color:var(--text-secondary)">暂无参考</span>';
}

function setRPTodo(text) {
  document.getElementById('rpTodo').innerHTML = text;
}

function setRPRef(key, val) {
  var el = document.getElementById('rpRef');
  if (el.innerHTML.indexOf('暂无参考') === 0) el.innerHTML = '';
  var div = document.createElement('div');
  div.style.cssText = 'font-size:11px;margin-bottom:4px;display:flex;gap:6px';
  div.innerHTML = '<span style="color:var(--text-secondary);flex-shrink:0">' + escapeHtml(key) + '</span><span style="color:var(--text);word-break:break-all">' + escapeHtml(val) + '</span>';
  if (el.children.length > 5) el.removeChild(el.lastElementChild);
  el.insertBefore(div, el.firstChild);
}

function addRPArtifact(name, preview) {
  var el = document.getElementById('rpArtifacts');
  if (el.innerHTML.indexOf('暂无产物') === 0) el.innerHTML = '';
  var div = document.createElement('div');
  div.style.cssText = 'font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);';
  div.innerHTML = '<span style="font-weight:600">' + escapeHtml(name) + '</span><br><span style="color:var(--text-secondary)">' + escapeHtml(preview).substring(0, 80) + '</span>';
  el.appendChild(div);
}

// ---- Trace panel ----
var _traceOpen = false;
function toggleTrace() {
  _traceOpen = !_traceOpen;
  document.getElementById('traceOverlay').classList.toggle('hidden', !_traceOpen);
  document.getElementById('traceDrawer').classList.toggle('hidden', !_traceOpen);
  if (_traceOpen) {
    loadTrace();
    // Reset to list view
    document.getElementById('traceList').style.display = '';
    document.getElementById('traceDetail').style.display = 'none';
  }
}

function loadTrace() {
  fetch('/api/trace/stats')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('traceStats').innerHTML =
        '<div class="td-stat"><div class="val">' + (data.total_events || 0) + '</div><div class="lbl">Events</div></div>' +
        '<div class="td-stat"><div class="val">' + (data.total_sessions || 0) + '</div><div class="lbl">Sessions</div></div>' +
        '<div class="td-stat"><div class="val" style="color:' + (data.total_errors ? 'var(--error)' : 'var(--success)') + '">' + (data.total_errors || 0) + '</div><div class="lbl">Errors</div></div>';
      document.getElementById('traceBadge').textContent = data.total_sessions || 0;
      document.getElementById('traceBadge').style.display = data.total_sessions ? '' : 'none';
    })
    .catch(function() {});

  fetch('/api/trace/sessions?limit=50')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('traceList');
      if (!data.length) {
        el.innerHTML = '<div class="td-empty">暂无追踪数据</div>';
        return;
      }
      el.innerHTML = data.map(function(s) {
        return '<div class="td-item" onclick="loadTraceDetail(\'' + s.session_id + '\')">' +
          '<div>' +
            '<div class="sid">' + escapeHtml(s.session_id) + '</div>' +
            '<div class="meta">' +
              '<span>' + (s.started || '') + '</span>' +
              '<span>' + (s.total_events || 0) + ' events</span>' +
              '<span>' + (s.tool_calls || 0) + ' tools</span>' +
            '</div>' +
          '</div>' +
          '<div style="display:flex;gap:4px">' +
            (s.errors ? '<span class="td-tag td-tag-err">' + s.errors + ' err</span>' : '') +
            '<span class="td-tag td-tag-info">' + (s.tool_calls || 0) + ' tools</span>' +
          '</div>' +
        '</div>';
      }).join('');
    })
    .catch(function() {});
}

function loadTraceDetail(sid) {
  document.getElementById('traceList').style.display = 'none';
  var el = document.getElementById('traceDetail');
  el.style.display = 'flex';
  el.innerHTML = '<div class="td-empty">加载中...</div>';

  fetch('/api/trace/sessions/' + encodeURIComponent(sid))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.events.length) {
        el.innerHTML = '<button class="td-back" onclick="backToList()">&larr; 返回</button><div class="td-empty">无事件</div>';
        return;
      }
      var html = '<button class="td-back" onclick="backToList()">&larr; 返回会话列表</button>';
      html += data.events.map(function(e) {
        var icon = e.ok === 0 ? '&#x26D4;' : '&#x2705;';
        var err = e.error ? '<div class="eerror">' + escapeHtml(e.error) + '</div>' : '';
        var args = e.arguments ? '<code>' + escapeHtml(typeof e.arguments === 'string' ? e.arguments : JSON.stringify(e.arguments).substring(0, 200)) + '</code>' : '';
        var preview = e.result_preview ? '<div>' + escapeHtml(e.result_preview) + '</div>' : '';
        return '<div class="td-event">' +
          '<div class="erow">' +
            '<span class="etype">' + icon + ' ' + (e.event_type || 'event') +
              (e.tool_name ? ' &rarr; ' + escapeHtml(e.tool_name) : '') +
              (e.agent_id ? ' (' + escapeHtml(e.agent_id) + ')' : '') +
            '</span>' +
            '<span class="etime">' + (e.ts || '') + (e.elapsed_ms ? ' ' + e.elapsed_ms + 'ms' : '') + '</span>' +
          '</div>' +
          err + args + preview +
        '</div>';
      }).join('');
      el.innerHTML = html;
    })
    .catch(function() {
      el.innerHTML = '<button class="td-back" onclick="backToList()">&larr; 返回</button><div class="td-empty">加载失败</div>';
    });
}

function backToList() {
  document.getElementById('traceList').style.display = '';
  document.getElementById('traceDetail').style.display = 'none';
}

// ---- Resizable panels ----
(function() {
  var CONFIG = {
    sidebar: { key: 'mx-sidebar-w', min: 160, max: 400, default: 220, cssVar: '--sidebar-width', el: null },
    rpanel:  { key: 'mx-rpanel-w',  min: 160, max: 500, default: 240, cssVar: '--rpanel-width',  el: null },
    trace:   { key: 'mx-trace-w',   min: 280, max: 900, default: 380, cssVar: '--trace-width',   el: null, reverse: true }
  };

  // Restore saved widths
  Object.keys(CONFIG).forEach(function(k) {
    var c = CONFIG[k];
    var saved = localStorage.getItem(c.key);
    if (saved) {
      var v = parseInt(saved, 10);
      if (v >= c.min && v <= c.max) {
        document.documentElement.style.setProperty(c.cssVar, v + 'px');
      }
    }
  });

  // Init handles
  document.getElementById('rhSidebar').addEventListener('mousedown', makeDrag(CONFIG.sidebar, 'rhSidebar'));
  document.getElementById('rhRpanel').addEventListener('mousedown', makeDrag(CONFIG.rpanel, 'rhRpanel'));
  document.getElementById('rhTrace').addEventListener('mousedown', makeDrag(CONFIG.trace, 'rhTrace'));

  function makeDrag(config, handleId) {
    return function(e) {
      e.preventDefault();
      var startX = e.clientX;
      var startWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue(config.cssVar)) || config.default;
      var handle = document.getElementById(handleId);
      handle.classList.add('active');
      document.body.classList.add('resize-active');

      function onMove(ev) {
        var delta = config.reverse ? (startX - ev.clientX) : (ev.clientX - startX);
        var newWidth = Math.max(config.min, Math.min(config.max, startWidth + delta));
        document.documentElement.style.setProperty(config.cssVar, newWidth + 'px');
      }

      function onUp() {
        handle.classList.remove('active');
        document.body.classList.remove('resize-active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        var finalWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue(config.cssVar));
        localStorage.setItem(config.key, Math.round(finalWidth));
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
  }
})();
